services:
  postgres:
    image: postgres:16-alpine
    container_name: uni_mall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uni_mall
      POSTGRES_USER: mall
      POSTGRES_PASSWORD: mall_password
    ports:
      - "5432:5432"
    volumes:
      - uni_mall_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mall -d uni_mall"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  uni_mall_pg_data:
